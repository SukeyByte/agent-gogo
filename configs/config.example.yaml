server:
  host: "127.0.0.1"
  port: 8080

llm:
  provider: "openai"
  model: ""
  base_url: ""
  api_key: "${OPENAI_API_KEY}"
  timeout: 120

embedding:
  provider: "openai"
  model: ""

browser:
  provider: "chrome_mcp"
  mcp_url: "http://127.0.0.1:9222"
  headless: false
  timeout: 60

storage:
  sqlite_path: "./data/agent.db"
  artifact_path: "./data/artifacts"
  skill_path: "./skills"
  persona_path: "./personas"

runtime:
  max_tasks_per_project: 50
  max_retries: 3
  token_budget: 32000
  enable_prompt_cache: true
  enable_auto_repair: true

security:
  require_confirm_high_risk: true
  allow_shell: false
