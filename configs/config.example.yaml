server:
  host: "127.0.0.1"
  port: 8080

llm:
  provider: "deepseek"
  model: "deepseek-v4-flash"
  base_url: "https://api.deepseek.com"
  api_key: "${DEEPSEEK_API_KEY}"
  timeout: 120
  thinking_enabled: false
  reasoning_effort: ""

browser:
  provider: "chrome_mcp"
  mcp_url: "http://127.0.0.1:9222"
  auto_start_mcp: true
  debug_port: 9223
  chrome_path: ""
  user_data_dir: ""
  headless: true
  timeout: 60
  max_summary_length: 12000

communication:
  channel_id: "cli"
  session_id: "local"

storage:
  sqlite_path: "./data/agent.db"
  artifact_path: "./data/artifacts"
  skill_roots:
    - "~/.claude/skills"
    - ".claude/skills"
  persona_path: "./personas"

runtime:
  max_tasks_per_project: 50
  max_retries: 3
  token_budget: 32000
  enable_prompt_cache: true
  enable_auto_repair: true

security:
  require_confirm_high_risk: true
  allow_shell: false
